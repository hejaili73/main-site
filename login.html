<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- الحظر الصارم لمحركات البحث (الأمان والخصوصية) -->
    <meta name="robots" content="noindex, nofollow">
    
    <title>تسجيل الدخول | Hejaili Digital Repository</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-8 sm:p-10 rounded-3xl shadow-2xl border border-slate-200 relative overflow-hidden">
        
        <!-- الديكور العلوي -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-500 to-emerald-500"></div>

        <!-- الشعار والهوية -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">hejaili.com</h1>
            <p class="text-sm font-medium text-slate-500 mt-1">المستودع الرقمي للعائلة</p>
        </div>

        <!-- رسالة الخطأ (مخفية افتراضياً) -->
        <div id="error-msg" class="hidden mb-4 p-3 rounded-xl bg-red-50 text-red-600 border border-red-100 text-sm font-bold text-center flex items-center justify-center gap-2">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">بيانات الدخول غير صحيحة</span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="login-form" class="space-y-5" onsubmit="return false;">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5" for="email">البريد الإلكتروني</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" id="email" required dir="ltr"
                        class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl pr-10 pl-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-sans"
                        placeholder="family@hejaili.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5" for="password">كلمة المرور</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" required dir="ltr"
                        class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl pr-10 pl-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-sans"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-slate-900 text-white rounded-xl py-3.5 font-bold text-base hover:bg-slate-800 shadow-lg shadow-slate-900/20 transition-all flex items-center justify-center gap-2 mt-4">
                <span>دخول آمن</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-xs font-bold text-slate-400">
                <i class="fa-solid fa-lock text-emerald-500 mr-1"></i> هذا الموقع خاص ومحمي بالتشفير. يمنع الدخول لغير المصرح لهم.
            </p>
        </div>
    </div>

    <!-- Firebase SDK (Modular Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // مفاتيح الربط الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyDF3GHcEs-By2HQBpF0905LLdV6lV2wzO4",
            authDomain: "hejaili-ec4b9.firebaseapp.com",
            projectId: "hejaili-ec4b9",
            storageBucket: "hejaili-ec4b9.firebasestorage.app",
            messagingSenderId: "656532128742",
            appId: "1:656532128742:web:b6828996ab261bea6c8c27"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // واجهة المستخدم
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        // التحقق مما إذا كان المستخدم مسجلاً بالفعل لترحيله للرئيسية
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "travel.html"; // توجيه لصفحة السفر بعد الدخول الناجح
            }
        });

        // عملية تسجيل الدخول
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // تغيير حالة الزر
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحقق...';
            loginBtn.disabled = true;
            errorMsg.classList.add('hidden');

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // تم الدخول بنجاح، سيتم التوجيه تلقائياً عبر onAuthStateChanged
                })
                .catch((error) => {
                    // فشل الدخول
                    loginBtn.innerHTML = '<span>دخول آمن</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                    loginBtn.disabled = false;
                    errorMsg.classList.remove('hidden');
                    
                    if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errorText.textContent = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
                    } else {
                        errorText.textContent = "حدث خطأ في الاتصال، حاول مرة أخرى.";
                        console.error(error);
                    }
                });
        });
    </script>
</body>
</html>
