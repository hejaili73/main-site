            </div>

            </div>

            <!-- Left Side (Tools + Home Link) -->
            <div class="flex items-center gap-2">

                <button onclick="exportData()" class="w-9 h-9 flex items-center justify-center text-ink-soft hover:text-emerald-700 hover:bg-page rounded-lg transition-colors focus-ring" title="نسخ احتياطي (تنزيل المحتوى)">
                    <i class="fa-solid fa-cloud-arrow-down text-base"></i>
                </button>
                <button onclick="document.getElementById('importFile').click()" class="w-9 h-9 flex items-center justify-center text-ink-soft hover:text-emerald-700 hover:bg-page rounded-lg transition-colors focus-ring" title="استعادة نسخة احتياطية (رفع ملف)">

                </button>

                <span class="w-px h-6 bg-divider-strong mx-1 hidden sm:block"></span>

                    <i class="fa-solid fa-house text-base"></i> 
                </a>
            </div>
        </div>
    </header>

            <!-- Toolbar: count + legend -->

                <span class="text-[11px] text-ink-soft flex items-center gap-1.5">

            </div>

            <div id="surahGridContainer" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-2 sm:gap-3 pb-10">

            </div>
        </div>

                </div>
            </div>
        </div>

        const quranData = rawData.map(surah => ({
            ...surah,
            type: madaniSurahs.includes(surah.id) ? 'مدنية' : 'مكية'
        }));

        // Storage setup (version 4 supports advanced data structures)
        const STORAGE_KEY = 'hejaili_quran_data_v4'; 
        let localQuranData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        
        let currentEditingSurahId = null;
        let editingItemIndex = null;

        // Verse Tags configuration
        const tagConfig = {
            'دعاء': { icon: 'fa-hands-praying', color: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            'حوار': { icon: 'fa-comments', color: 'text-clay-700', bg: 'bg-clay-50', border: 'border-clay-200' },
            'أسماء الله الحسنى': { icon: 'fa-crown', color: 'text-gold-700', bg: 'bg-gold-50', border: 'border-gold-200' },

            'نداء': { icon: 'fa-bullhorn', color: 'text-rust-700', bg: 'bg-rust-50', border: 'border-rust-200' },

        // Does a surah have any saved content?
        function surahHasContent(id) {
            const d = localQuranData[id];
            if (!d) return false;
            return ['reason','virtues','benefits','verses','youtube','links']
                .some(k => Array.isArray(d[k]) && d[k].length > 0);
        }

        function renderSurahs() {
            const container = document.getElementById('surahGridContainer');
            const countEl = document.getElementById('surahCount');

            let html = '';
            quranData.forEach(surah => {
                const filled = surahHasContent(surah.id);
                html += `
                    <button type="button" onclick="showDetail(${surah.id})" aria-label="سورة ${surah.name}" class="relative bg-white border border-divider rounded-xl hover:border-emerald-300 hover:shadow-md transition-all duration-300 cursor-pointer flex flex-col items-center justify-center p-2.5 min-h-[4.5rem] group focus-ring">
                        ${filled ? `<span class="absolute top-1.5 left-1.5 w-2 h-2 rounded-full bg-emerald-500 shadow-sm" title="تحتوي على محتوى"></span>` : ``}
                        <span class="text-[10px] text-ink-soft font-bold mb-1 opacity-70 group-hover:text-emerald-600 transition-colors leading-none">${surah.id}</span>
                        <span class="font-naskh text-base md:text-lg font-bold text-ink-strong group-hover:text-emerald-700 transition-colors leading-none whitespace-nowrap pt-1">${surah.name}</span>
                    </button>
                `;
            });

            container.innerHTML = html;

            const filledCount = quranData.filter(s => surahHasContent(s.id)).length;
            if (countEl) {
                countEl.innerHTML = `${quranData.length} سورة · <span class="text-emerald-700">${filledCount} بمحتوى</span>`;
            }
        }

        function formatList(arr) {
            if(!arr || !Array.isArray(arr) || arr.length === 0) {
                return `<span class="text-ink-soft italic opacity-70 font-sans text-[11px]">« لا يوجد محتوى مضاف حتى الآن »</span>`;
            }
            let html = '<ul class="space-y-4">';
            arr.forEach((item, index) => {
                html += `<li class="flex items-start gap-3">
                            <span class="flex-shrink-0 w-6 h-6 flex items-center justify-center rounded-md bg-white border border-divider text-ink-soft font-bold text-[11px] mt-0.5 shadow-sm">${index + 1}</span>
                            <div class="flex-1 text-sm md:text-base">${item.replace(/\n/g, '<br>')}</div>
                         </li>`;
            });
            html += '</ul>';
            return html;
        }

        function formatLinks(arr, type) {
            if(!arr || !Array.isArray(arr) || arr.length === 0) {
                return `<div class="w-full flex items-center justify-center gap-3 bg-white text-ink-soft border border-divider px-4 py-2.5 rounded-xl font-bold italic text-[11px] shadow-sm"><i class="fa-solid fa-link text-base opacity-50"></i> لا يوجد بيانات</div>`;
            }
            
            const isYt = type === 'youtube';
            const colorClass = isYt ? 'bg-amber-50 text-amber-700 hover:bg-amber-100 border-amber-200' : 'bg-white text-stone-700 hover:bg-stone-50 border-stone-200';
            const numClass = isYt ? 'bg-amber-200/60 text-amber-900' : 'bg-stone-100 text-stone-500';
            const iconClass = isYt ? 'fa-youtube' : 'fa-globe';

            let html = '<div class="space-y-2">';
            arr.forEach((item, index) => {
                const title = item.title || (isYt ? 'مقطع يوتيوب' : 'رابط مفيد');
                html += `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-between gap-3 border px-4 py-2.5 rounded-xl font-bold text-xs transition-all shadow-sm focus-ring group ${colorClass}">
                            <div class="flex items-center gap-2 overflow-hidden">
                                <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center rounded-md text-[10px] ${numClass}">${index + 1}</span>
                                <i class="fa-brands ${iconClass} text-lg flex-shrink-0"></i> 
                                <span class="truncate block w-full text-right" title="${title}">${title}</span>
                            </div>
                            <i class="fa-solid fa-arrow-up-right-from-square opacity-50 group-hover:opacity-100 transition-opacity flex-shrink-0"></i>
                         </a>`;
            });
            html += '</div>';
            return html;
        }

        function formatVerses(arr) {
            const statsContainer = document.getElementById('detailVerseStats');
            const contentContainer = document.getElementById('detailVersesContent');
            
            // Group by tag
            const grouped = {};
            if(arr && Array.isArray(arr)) {
                arr.forEach(item => {
                    if(!grouped[item.tag]) grouped[item.tag] = [];
                    grouped[item.tag].push(item.text);
                });
            }

            const categories = ['دعاء', 'حوار', 'أسماء الله الحسنى', 'قصة', 'مثل', 'نداء', 'قاعدة قرآنية', 'مشاهد القيامة', 'أحكام وتوجيهات'];
            
            // Interactive Stats Bar
            let statsHtml = '<div class="grid grid-cols-2 md:grid-cols-3 gap-3 w-full">';
            categories.forEach(tag => {
                const conf = tagConfig[tag];
                const count = grouped[tag] ? grouped[tag].length : 0;
                const opacityClass = count > 0 ? 'opacity-100' : 'opacity-60 grayscale hover:grayscale-0 hover:opacity-100';
                
                statsHtml += `
                    <button onclick="openEditModal('verses', 'إضافة آية', '${tag}')" class="flex items-center justify-between p-3 rounded-xl border ${conf.border} ${conf.bg} hover:shadow-md transition-all group ${opacityClass} text-right focus-ring">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 flex-shrink-0 rounded-lg bg-white flex items-center justify-center shadow-sm ${conf.color}"><i class="fa-solid ${conf.icon}"></i></div>
                            <span class="font-bold text-xs sm:text-sm text-ink-strong leading-tight">${tag}</span>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="font-black text-lg ${conf.color}">${count}</span>
                            <i class="fa-solid fa-plus text-[10px] text-ink-soft opacity-0 group-hover:opacity-100 transition-opacity bg-white p-1.5 rounded-md border border-divider"></i>
                        </div>
                    </button>
                `;
            });
            statsHtml += '</div>';
            statsContainer.innerHTML = statsHtml;

            // Content List
            if(!arr || arr.length === 0) {
                contentContainer.innerHTML = '';
                return;
            }

            let contentHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 pt-6 border-t border-teal-200/60 w-full">';
            for (let tag in grouped) {
                const conf = tagConfig[tag];
                contentHtml += `
                    <div class="bg-white border ${conf.border} rounded-xl p-5 shadow-sm flex flex-col h-full">
                        <h4 class="text-sm font-bold ${conf.color} flex items-center gap-2 mb-3 border-b ${conf.border} pb-2"><i class="fa-solid ${conf.icon}"></i> آيات: ${tag}</h4>
                        <ul class="space-y-3 flex-grow">
                            ${grouped[tag].map((text, i) => `
                                <li class="flex items-start gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 flex items-center justify-center rounded-md ${conf.bg} ${conf.color} font-bold text-[11px] mt-0.5">${i+1}</span>
                                    <p class="hadith-naskh text-sm md:text-base leading-relaxed text-ink-strong">${text.replace(/\n/g, '<br>')}</p>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            contentHtml += '</div>';
            contentContainer.innerHTML = contentHtml;
        }

        function showDetail(surahId) {
            currentEditingSurahId = surahId;
            const surah = quranData.find(s => s.id === surahId);
            if(!surah) return;

            document.getElementById('detailSurahNumber').innerText = surah.id;
            document.getElementById('detailSurahName').innerText = "سورة " + surah.name;
            const typeEl = document.getElementById('detailSurahType');
            typeEl.innerText = surah.type;
            typeEl.className = surah.type === 'مدنية' ? 'text-clay-700' : 'text-emerald-700';
            
            // Generate Links
            document.getElementById('detailTelegramLink').href = surah.link;
            document.getElementById('detailRecitationLink').href = "https://quran.com/ar/" + surah.id;

            const data = localQuranData[surahId] || {};
            
            document.getElementById('detailReason').innerHTML = formatList(data.reason);
            document.getElementById('detailVirtues').innerHTML = formatList(data.virtues);
            document.getElementById('detailBenefits').innerHTML = formatList(data.benefits);
            
            document.getElementById('detailYoutube').innerHTML = formatLinks(data.youtube, 'youtube');
            document.getElementById('detailLinks').innerHTML = formatLinks(data.links, 'links');
            formatVerses(data.verses);

            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('logoLink').classList.add('hidden');
            document.getElementById('backButton').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showMainView() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('backButton').classList.add('hidden');
            document.getElementById('logoLink').classList.remove('hidden');
            renderSurahs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openEditModal(defaultCat = 'reason', title = 'إدارة المحتوى', defaultTag = null) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalCategorySelect').value = defaultCat;
            
            switchModalCategory();
            
            if(defaultCat === 'verses' && defaultTag) {
                document.getElementById('modalVerseTag').value = defaultTag;
            }
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function switchModalCategory() {
            const cat = document.getElementById('modalCategorySelect').value;
            const isMedia = (cat === 'youtube' || cat === 'links');
            const isVerses = (cat === 'verses');

            editingItemIndex = null;
            updateAddButtonLabel();
            document.getElementById('modalTextInput').value = '';
            document.getElementById('modalLinkTitle').value = '';
            document.getElementById('modalLinkUrl').value = '';

            if (isMedia) {
                document.getElementById('modalTextInput').classList.add('hidden');
                document.getElementById('modalLinkInputs').classList.remove('hidden');
                document.getElementById('modalLinkInputs').classList.add('flex');
            } else {
                document.getElementById('modalTextInput').classList.remove('hidden');
                document.getElementById('modalLinkInputs').classList.add('hidden');
                document.getElementById('modalLinkInputs').classList.remove('flex');
            }

            if (isVerses) {
                document.getElementById('modalVerseTagContainer').classList.remove('hidden');
            } else {
                document.getElementById('modalVerseTagContainer').classList.add('hidden');
            }
            
            renderModalItems();
            
            setTimeout(() => {
                if (isMedia) document.getElementById('modalLinkTitle').focus();
                else document.getElementById('modalTextInput').focus();
            }, 50);
        }

        function renderModalItems() {
            const cat = document.getElementById('modalCategorySelect').value;
            const container = document.getElementById('modalExistingItems');
            const data = localQuranData[currentEditingSurahId] || {};
            let arr = data[cat] || [];

            if (arr.length === 0) {
                container.innerHTML = '<p class="text-[11px] text-ink-soft italic text-center py-4 bg-white rounded-xl border border-divider">لا توجد مدخلات في هذا القسم.</p>';
                return;
            }

            let html = '';
            arr.forEach((item, index) => {
                let displayItem = '';
                if (cat === 'youtube' || cat === 'links') {
                    displayItem = `<div class="flex flex-col"><span class="font-bold text-emerald-700 text-sm">${item.title}</span><a href="${item.url}" target="_blank" dir="ltr" class="text-ink-soft hover:underline text-[11px] truncate mt-1 max-w-[250px]">${item.url}</a></div>`;
                } else if (cat === 'verses') {
                    displayItem = `<div class="flex flex-col"><span class="font-bold text-teal-700 text-[10px] bg-teal-50 px-2 py-0.5 rounded border border-teal-100 w-fit mb-1">${item.tag}</span><span class="hadith-naskh text-sm leading-relaxed">${item.text.replace(/\n/g, '<br>')}</span></div>`;
                } else {
                    displayItem = item.replace(/\n/g, '<br>');
                }
                    
                html += `
                    <div class="flex items-start gap-3 bg-white p-3 rounded-xl border border-divider shadow-sm group">
                        <span class="flex-shrink-0 bg-surface-alt text-ink-soft border border-divider w-6 h-6 flex items-center justify-center rounded-md text-[11px] font-bold mt-0.5">${index + 1}</span>
                        <div class="flex-1 text-sm text-ink-strong overflow-hidden">${displayItem}</div>
                        <button onclick="startEditItem(${index})" class="text-ink-soft hover:text-emerald-700 hover:bg-emerald-50 w-7 h-7 flex items-center justify-center rounded transition-colors shrink-0" title="تعديل">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteModalItem(${index})" class="text-rose-400 hover:text-rose-600 hover:bg-rose-50 w-7 h-7 flex items-center justify-center rounded transition-colors shrink-0" title="حذف">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function persist() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(localQuranData));
                return true;
            } catch (e) {
                alert('تعذّر الحفظ في المتصفح. قد تكون مساحة التخزين ممتلئة أو معطّلة. ننصح بأخذ نسخة احتياطية.');
                return false;
            }
        }

        function updateAddButtonLabel() {
            const btn = document.getElementById('modalAddBtn');
            if (!btn) return;
            if (editingItemIndex !== null) {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> حفظ التعديل';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> إضافة';
            }
        }

        function startEditItem(index) {
            const cat = document.getElementById('modalCategorySelect').value;
            const item = (localQuranData[currentEditingSurahId]?.[cat] || [])[index];
            if (item === undefined) return;

            if (cat === 'youtube' || cat === 'links') {
                document.getElementById('modalLinkTitle').value = item.title || '';
                document.getElementById('modalLinkUrl').value = item.url || '';
                setTimeout(() => document.getElementById('modalLinkTitle').focus(), 50);
            } else if (cat === 'verses') {
                document.getElementById('modalTextInput').value = item.text || '';
                document.getElementById('modalVerseTag').value = item.tag || 'دعاء';
                setTimeout(() => document.getElementById('modalTextInput').focus(), 50);
            } else {
                document.getElementById('modalTextInput').value = item;
                setTimeout(() => document.getElementById('modalTextInput').focus(), 50);
            }
            editingItemIndex = index;
            updateAddButtonLabel();
        }

        function addNewItem() {
            const cat = document.getElementById('modalCategorySelect').value;
            let val;
            
            if (cat === 'youtube' || cat === 'links') {
                const titleVal = document.getElementById('modalLinkTitle').value.trim();
                const urlVal = document.getElementById('modalLinkUrl').value.trim();
                if (!urlVal) return;
                val = { title: titleVal || (cat==='youtube'?'مقطع يوتيوب':'رابط'), url: urlVal };
            } else if (cat === 'verses') {
                const textVal = document.getElementById('modalTextInput').value.trim();
                const tagVal = document.getElementById('modalVerseTag').value;
                if (!textVal) return;
                val = { tag: tagVal, text: textVal };
            } else {
                val = document.getElementById('modalTextInput').value.trim();
                if (!val) return;
            }

            if(!localQuranData[currentEditingSurahId]) localQuranData[currentEditingSurahId] = {};
            if(!Array.isArray(localQuranData[currentEditingSurahId][cat])) localQuranData[currentEditingSurahId][cat] = [];
            
            if (editingItemIndex !== null) {
                localQuranData[currentEditingSurahId][cat][editingItemIndex] = val;
                editingItemIndex = null;
                updateAddButtonLabel();
            } else {
                localQuranData[currentEditingSurahId][cat].push(val);
            }
            persist();
            
            document.getElementById('modalLinkTitle').value = '';
            document.getElementById('modalLinkUrl').value = '';
            document.getElementById('modalTextInput').value = '';
            
            renderModalItems(); 
            showDetail(currentEditingSurahId); 
            
            const modalBody = document.querySelector('.overflow-y-auto');
            modalBody.scrollTop = modalBody.scrollHeight;
        }

        function deleteModalItem(index) {
            if (!confirm('هل تريد حذف هذا المُدخل؟')) return;
            const cat = document.getElementById('modalCategorySelect').value;
            localQuranData[currentEditingSurahId][cat].splice(index, 1);
            persist();

            editingItemIndex = null;
            updateAddButtonLabel();
            document.getElementById('modalLinkTitle').value = '';
            document.getElementById('modalLinkUrl').value = '';
            document.getElementById('modalTextInput').value = '';

            renderModalItems(); 
            showDetail(currentEditingSurahId); 
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                if (!document.getElementById('editModal').classList.contains('hidden')) {
                    closeEditModal();
                } else if (!document.getElementById('detailView').classList.contains('hidden')) {
                    showMainView();
                }
            }
        });

        // ----- Backup / Restore -----
        function exportData() {
            if (!localQuranData || Object.keys(localQuranData).length === 0) {
                alert('لا يوجد محتوى محفوظ لتصديره بعد.');
                return;
            }
            const blob = new Blob([JSON.stringify(localQuranData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const stamp = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `hejaili-quran-backup-${stamp}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)) {
                        throw new Error('invalid structure');
                    }
                    if (!confirm('سيؤدي الاستيراد إلى استبدال كل المحتوى الحالي بالنسخة المرفوعة. ننصح بأخذ نسخة احتياطية أولاً. هل تريد المتابعة؟')) {
                        event.target.value = '';
                        return;
                    }
                    localQuranData = parsed;
                    if (persist()) {
                        renderSurahs();
                        if (currentEditingSurahId && !document.getElementById('detailView').classList.contains('hidden')) {
                            showDetail(currentEditingSurahId);
                        }
                        alert('تم استيراد النسخة الاحتياطية بنجاح.');
                    }
                } catch (err) {
                    alert('الملف غير صالح. تأكد من اختيار ملف نسخة احتياطية صحيح بصيغة JSON.');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // Initialize App
        renderSurahs();

    </script>
</body>
</html>
