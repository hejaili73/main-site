            suitcase: {
                label: 'Suitcase', icon: 'fa-suitcase-rolling', color: '#c2823a',
                sub: ['Clothes', 'Toiletries', 'Health', 'Electronics', 'Personal', 'Financial']
            },
            backpack: { label: 'Backpack', icon: 'fa-bag-shopping', color: '#0ea5e9' },
            documents: { label: 'Documents', icon: 'fa-passport', color: '#6366f1' }
        };

        const defaultPacking = () => ({
            suitcase: {
                Clothes: ['Shirts', 'Pants', 'Underwear', 'Socks', 'Jacket', 'Sleepwear', 'Shoes'].map(n => ({ name: n, checked: false })),
                Toiletries: ['Toothbrush', 'Toothpaste', 'Shampoo', 'Deodorant', 'Razor', 'Comb'].map(n => ({ name: n, checked: false })),
                Health: ['Medications', 'First-aid kit', 'Vitamins', 'Hand sanitizer'].map(n => ({ name: n, checked: false })),
                Electronics: ['Chargers', 'Power bank', 'Adapter', 'Headphones'].map(n => ({ name: n, checked: false })),
                Personal: ['Sunglasses', 'Watch', 'Perfume', 'Glasses'].map(n => ({ name: n, checked: false })),
                Financial: ['Cash', 'Credit cards', 'Currency exchange'].map(n => ({ name: n, checked: false }))
            },
            backpack: ['Laptop', 'Phone', 'Snacks', 'Water bottle', 'Travel pillow', 'Book'].map(n => ({ name: n, checked: false })),
            documents: ['Passport', 'Visa', 'Flight tickets', 'Hotel reservations', 'Travel insurance', 'ID card', 'Driver license'].map(n => ({ name: n, checked: false }))
        });

        // Ensure a trip has a valid packing object (migrates older trips)
        const ensurePacking = (trip) => {
            if (!trip.packing) trip.packing = defaultPacking();
            if (!trip.packing.suitcase) trip.packing.suitcase = defaultPacking().suitcase;
            PACKING_GROUPS.suitcase.sub.forEach(s => { if (!Array.isArray(trip.packing.suitcase[s])) trip.packing.suitcase[s] = []; });
            if (!Array.isArray(trip.packing.backpack)) trip.packing.backpack = [];
            if (!Array.isArray(trip.packing.documents)) trip.packing.documents = [];
            return trip.packing;
        };

        // Count checked / total across the whole list
        const packingStats = (trip) => {
            const p = ensurePacking(trip);
            let total = 0, done = 0;
            PACKING_GROUPS.suitcase.sub.forEach(s => p.suitcase[s].forEach(i => { total++; if (i.checked) done++; }));
            p.backpack.forEach(i => { total++; if (i.checked) done++; });
            p.documents.forEach(i => { total++; if (i.checked) done++; });
            return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
        };

        // Render one list of items (with checkboxes, add & delete)
        const renderPackingItems = (tripId, path, items, accent) => {
            let html = `<ul class="space-y-1.5 mb-2">`;
            if (!items.length) {
                html += `<li class="text-xs italic text-slate-400 py-1">No items yet.</li>`;
            }
            items.forEach((item, idx) => {
                html += `
                    <li class="flex items-center gap-2 group">
                        <button onclick="togglePackItem('${tripId}', '${path}', ${idx})" class="w-5 h-5 shrink-0 rounded-md border flex items-center justify-center transition-all ${item.checked ? 'text-white' : 'bg-white border-slate-300 text-transparent hover:border-slate-400'}" style="${item.checked ? `background-color:${accent};border-color:${accent}` : ''}" aria-label="Toggle">
                            <i class="fa-solid fa-check text-[10px]"></i>
                        </button>
                        <span class="text-sm flex-grow ${item.checked ? 'line-through text-slate-400' : 'text-slate-700'}">${escHtml(item.name)}</span>
                        <button onclick="deletePackItem('${tripId}', '${path}', ${idx})" class="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-all text-xs px-1" aria-label="Delete"><i class="fa-solid fa-xmark"></i></button>
                    </li>`;
            });
            html += `</ul>
                <button onclick="addPackItem('${tripId}', '${path}')" class="text-[11px] font-bold text-slate-400 hover:text-slate-700 transition flex items-center gap-1"><i class="fa-solid fa-plus"></i> Add item</button>`;
            return html;
        };

        window.renderPackingSection = (tripId) => {
            const trip = tripsData.find(t => t.id === tripId);
            if (!trip) return '';
            const p = ensurePacking(trip);
            const stats = packingStats(trip);
            const sc = PACKING_GROUPS.suitcase, bp = PACKING_GROUPS.backpack, dc = PACKING_GROUPS.documents;

            let html = `
                <div class="bg-white/90 backdrop-blur-md rounded-3xl border border-slate-200 p-6 shadow-sm mb-6 fade-in">
                    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-suitcase-rolling text-emerald-500"></i> Packing Checklist</h3>
                        <div class="flex items-center gap-3 flex-grow max-w-xs min-w-[180px]">
                            <div class="flex-grow h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-emerald-500 rounded-full transition-all duration-500" style="width:${stats.pct}%"></div>
                            </div>
                            <span class="text-xs font-black text-emerald-700 whitespace-nowrap">${stats.done}/${stats.total} · ${stats.pct}%</span>
                        </div>
                    </div>

                    <!-- Suitcase -->
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-100">
                            <i class="fa-solid ${sc.icon} text-lg" style="color:${sc.color}"></i>
                            <h4 class="font-bold text-slate-800">${sc.label}</h4>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-5">
            `;
            sc.sub.forEach(s => {
                html += `
                    <div>
                        <p class="text-xs font-bold uppercase tracking-wide mb-2" style="color:${sc.color}">${s}</p>
                        ${renderPackingItems(tripId, 'suitcase.' + s, p.suitcase[s], sc.color)}
                    </div>`;
            });
            html += `
                        </div>
                    </div>

                    <!-- Backpack + Documents -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-100">
                                <i class="fa-solid ${bp.icon} text-lg" style="color:${bp.color}"></i>
                                <h4 class="font-bold text-slate-800">${bp.label}</h4>
                            </div>
                            ${renderPackingItems(tripId, 'backpack', p.backpack, bp.color)}
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-100">
                                <i class="fa-solid ${dc.icon} text-lg" style="color:${dc.color}"></i>
                                <h4 class="font-bold text-slate-800">${dc.label}</h4>
                            </div>
                            ${renderPackingItems(tripId, 'documents', p.documents, dc.color)}
                        </div>
                    </div>
                </div>
            `;
            return html;
        };

        // Resolve a "path" string to the array it points at
        const resolvePackArray = (trip, path) => {
            const p = ensurePacking(trip);
            if (path.startsWith('suitcase.')) return p.suitcase[path.split('.')[1]];
            if (path === 'backpack') return p.backpack;
            if (path === 'documents') return p.documents;
            return null;
        };

        window.togglePackItem = async (tripId, path, idx) => {
            const trip = tripsData.find(t => t.id === tripId);
            const arr = resolvePackArray(trip, path);
            if (!arr || !arr[idx]) return;
            arr[idx].checked = !arr[idx].checked;
            window.renderTripPlanner(tripId);
            await syncTripToCloud(trip);
        };

        window.deletePackItem = async (tripId, path, idx) => {
            const trip = tripsData.find(t => t.id === tripId);
            const arr = resolvePackArray(trip, path);
            if (!arr) return;
            arr.splice(idx, 1);
            window.renderTripPlanner(tripId);
            await syncTripToCloud(trip);
        };

        window.addPackItem = async (tripId, path) => {
            const name = prompt('Add item:');
            if (!name || !name.trim()) return;
            const trip = tripsData.find(t => t.id === tripId);
            const arr = resolvePackArray(trip, path);
            if (!arr) return;
            arr.push({ name: name.trim(), checked: false });
            window.renderTripPlanner(tripId);
            await syncTripToCloud(trip);
        };

        window.openAddTripModal = () => {
            document.getElementById('new-trip-name').value = '';
            document.getElementById('new-trip-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('new-trip-days').value = '14';
            document.getElementById('add-trip-modal').classList.remove('hidden');
        };
        window.closeAddTripModal = () => document.getElementById('add-trip-modal').classList.add('hidden');

        window.saveNewTrip = async () => {
            const name = document.getElementById('new-trip-name').value.trim() || 'Untitled Trip';
            const date = document.getElementById('new-trip-date').value;
            const days = parseInt(document.getElementById('new-trip-days').value) || 14;
            
            if(!date) return window.showToast("Please select a start date", "bg-rose-500", "fa-triangle-exclamation");

            const newTrip = {
                id: 'trip_' + Date.now(),
                name: name,
                startDate: date,
                totalDays: days,
                destinations: [],
                timeline: {},
                budget: { intlFlights: '', domFlights: '', hotels: '', activities: '', restaurants: '', shopping: '' },
                packing: defaultPacking(),
                createdAt: Date.now()
            };
            
            closeAddTripModal();
            await syncTripToCloud(newTrip);
            window.showToast("Trip created!", "bg-emerald-600");
            if(state.view === 'trips') window.renderTrips();
        };

        window.updateTripBudget = async (tripId, field, value) => {
            const trip = tripsData.find(t => t.id === tripId);
            if(!trip) return;
            if(!trip.budget) trip.budget = {};
            trip.budget[field] = value;
            window.renderTripPlanner(tripId); // Refresh to update total calculation
            await syncTripToCloud(trip);
        };

        window.promptDeleteTrip = (tripId, e) => {
            e.stopPropagation();
            deleteContext = { isTrip: true, tripId };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.addDestToTrip = async (tripId) => {
            const countrySelect = document.getElementById('trip-country-select');
            const citySelect = document.getElementById('trip-city-select');
            
            const country = countrySelect.value;
            const city = citySelect.value;
            
            if(!country || !city) return window.showToast("Select Country & City first", "bg-amber-500", "fa-triangle-exclamation");
            
            const trip = tripsData.find(t => t.id === tripId);
            
            if(trip.destinations.find(d => d.city === city && d.country === country)) {
                return window.showToast("City already added");
            }

            const newDest = { id: 'd_' + Date.now(), country, city, color: generateColor() };
            trip.destinations.push(newDest);
            activeDestId = newDest.id;
            
            await syncTripToCloud(trip);
            window.renderTripPlanner(tripId);
        };

        window.removeDestFromTrip = async (tripId, destId, e) => {
            e.stopPropagation();
            const trip = tripsData.find(t => t.id === tripId);
            trip.destinations = trip.destinations.filter(d => d.id !== destId);
            for(let day in trip.timeline) { if(trip.timeline[day] === destId) delete trip.timeline[day]; }
            if(activeDestId === destId) activeDestId = null;
            await syncTripToCloud(trip);
            window.renderTripPlanner(tripId);
        };

        window.setActiveDest = (destId) => {
            activeDestId = destId;
            window.renderTripPlanner(state.tripId);
        };

        window.assignDayToTrip = async (tripId, dayNum) => {
            if(!activeDestId) return window.showToast("Select a destination card below first!", "bg-amber-500", "fa-triangle-exclamation");
            const trip = tripsData.find(t => t.id === tripId);
            if(trip.timeline[dayNum] === activeDestId) delete trip.timeline[dayNum];
            else trip.timeline[dayNum] = activeDestId;
            window.renderTripPlanner(tripId);
            await syncTripToCloud(trip);
        };

        // --- MAIN VIEWS ---

        window.renderCountries = (continentName) => {
            state.view = 'countries';
            state.continent = continentName;
            state.country = null;
            state.city = null;
            window.setBackground(null);
            window.updateBreadcrumb();

            const countries = dbTemplate[continentName].countries.sort((a, b) => a.name.localeCompare(b.name));
            
            const visitedCount = countries.filter(c => c.visited).length;
            const pct = countries.length ? Math.round((visitedCount / countries.length) * 100) : 0;

            let html = `
                <div class="mb-6 fade-in text-center relative">
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">${escHtml(continentName)}</h2>
                    <p class="text-slate-500 mt-1">Select a country to view its cities.</p>
                    <div class="max-w-xs mx-auto mt-4">
                        <div class="flex items-center justify-between text-[11px] font-bold text-slate-400 mb-1.5">
                            <span><i class="fa-solid fa-earth-americas mr-1 text-emerald-500"></i> Visited</span>
                            <span>${visitedCount} / ${countries.length}</span>
                        </div>
                        <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-500 rounded-full transition-all duration-500" style="width:${pct}%"></div>
                        </div>
                    </div>
                </div>

                <div class="max-w-md mx-auto mb-8 fade-in relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="country-search" oninput="filterCountries(this.value)" placeholder="Search countries..." class="w-full bg-white border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-sm font-medium text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 fade-in">
            `;

            countries.forEach(country => {
                const hasCities = country.cities && country.cities.length > 0;
                const isVisited = country.visited;
                const cn = escAttr(country.name);
                const cnH = escHtml(country.name);

                html += `
                    <div class="country-card relative rounded-2xl p-4 flex flex-col items-center text-center cursor-pointer card-hover shadow-sm border group ${isVisited ? 'visited-card' : 'bg-white border-slate-200'}" data-search="${cnH.toLowerCase()}">
                        
                        <!-- Visited Toggle Button -->
                        <button onclick="toggleCountryVisited('${continentName}', '${cn}', event)" class="absolute top-2 right-2 w-6 h-6 rounded-full flex items-center justify-center transition-all z-10 shadow-sm ${isVisited ? 'bg-emerald-600 text-white scale-110' : 'bg-slate-100 text-slate-300 hover:bg-emerald-100 hover:text-emerald-500'}" title="${isVisited ? 'Visited ✓' : 'Mark as visited'}">
                            <i class="fa-solid fa-check text-[10px]"></i>
                        </button>
                        
                        <div onclick="renderCities('${continentName}', '${cn}', '${country.iso}')" class="w-full h-full flex flex-col items-center">
                            <img src="https://flagcdn.com/w80/${country.iso}.png" alt="${cnH} flag" class="flag-img w-12 h-auto rounded-sm mb-3 shadow-sm group-hover:scale-110 transition-transform duration-300">
                            <h3 class="font-semibold ${isVisited ? 'text-emerald-800' : 'text-slate-700'} text-sm">${cnH}</h3>
                            ${hasCities ? '<span class="mt-2 w-1.5 h-1.5 rounded-full bg-blue-500 shadow-sm" title="Data Available"></span>' : '<span class="mt-2 w-1.5 h-1.5 rounded-full bg-slate-200" title="No Data Yet"></span>'}
                        </div>
                    </div>
                `;
            });
            html += `<p id="no-country-match" class="col-span-full text-center text-slate-400 italic py-8 hidden">No countries match your search.</p></div>`;
            contentEl.innerHTML = html;
        };

        window.filterCountries = (term) => {
            const q = term.trim().toLowerCase();
            const cards = document.querySelectorAll('#countries-grid .country-card');
            let shown = 0;
            cards.forEach(card => {
                const match = card.getAttribute('data-search').includes(q);
                card.style.display = match ? '' : 'none';
                if (match) shown++;
            });
            const empty = document.getElementById('no-country-match');
            if (empty) empty.classList.toggle('hidden', shown !== 0);
        };

        window.renderCities = (continentName, countryName, isoCode) => {
            state.view = 'cities';
            state.continent = continentName;
            state.country = countryName;
            state.city = null;
            window.setBackground(isoCode);
            window.updateBreadcrumb();

            const countryData = dbTemplate[continentName].countries.find(c => c.name === countryName);
            const countryInfo = countryData.info || {};
            
            const currLink = countryInfo.currencyLink || '';
            const embassyLink = countryInfo.embassy || '';
            const ytLink = countryInfo.youtube || '';
            const tgLink = countryInfo.telegram || '';
            const keepLink = countryInfo.keep || '';

            let html = `
                <div class="mb-10 fade-in relative flex flex-col items-center">
                    <div class="absolute right-0 top-0">
                        <button onclick="openAddCityModal('${continentName}', '${escAttr(countryName)}')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2 font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> Add City
                        </button>
                    </div>
                    <img src="https://flagcdn.com/w160/${isoCode}.png" alt="Flag" class="w-24 h-auto rounded-lg shadow-md border border-slate-200 mb-4">
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight text-center flex items-center justify-center gap-3">
                        ${escHtml(countryName)}
                        <a href="https://maps.google.com/?q=${encodeURIComponent(countryName)}" target="_blank" class="text-slate-300 hover:text-emerald-500 transition-colors text-3xl ml-1" title="Open in Google Maps">
                            <i class="fa-solid fa-map-location-dot"></i>
                        </a>
                    </h2>
                </div>

                <!-- Country Information Box -->
                <div class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl border border-slate-200 shadow-sm mb-6 fade-in">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <a href="https://ar.wikipedia.org/wiki/${encodeURIComponent(countryName)}" target="_blank" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl border border-slate-100 shadow-inner transition-colors group text-center flex flex-col items-center justify-center gap-2">
                            <i class="fa-brands fa-wikipedia-w text-2xl text-slate-400 group-hover:text-slate-600 transition"></i>
                            <span class="font-bold text-slate-700 text-sm">Info</span>
                        </a>
                        <a href="https://www.passportindex.org/passport/saudi-arabia/" target="_blank" class="bg-indigo-50 hover:bg-indigo-100 p-4 rounded-2xl border border-indigo-100 shadow-inner transition-colors group text-center flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-passport text-2xl text-indigo-400 group-hover:text-indigo-600 transition"></i>
                            <span class="font-bold text-indigo-700 text-sm">Visa</span>
                        </a>
                        
                        <div class="col-span-2 md:col-span-2 bg-emerald-50 p-3 rounded-2xl border border-emerald-100 shadow-inner flex flex-col justify-center">
                            <span class="block text-[10px] font-bold text-emerald-500 uppercase tracking-wider mb-1 ml-1"><i class="fa-solid fa-building-flag mr-1"></i> Saudi Embassy</span>
                            <div class="flex items-center gap-2">
                                <input type="url" placeholder="Paste link here..." value="${embassyLink}" onchange="updateCountryLink('${continentName}', '${escAttr(countryName)}', 'embassy', this.value, event)" class="w-full bg-white border border-emerald-200 text-emerald-800 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-xs">
                                <a href="${embassyLink || '#'}" target="${embassyLink ? '_blank' : '_self'}" class="w-9 h-9 shrink-0 bg-emerald-600 text-white rounded-xl flex items-center justify-center hover:bg-emerald-700 transition shadow-sm"><i class="fa-solid fa-arrow-right"></i></a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">
                        <div class="col-span-1 md:col-span-2 bg-blue-50 p-3 rounded-2xl border border-blue-100 shadow-inner flex flex-col justify-center">
                            <span class="block text-[10px] font-bold text-blue-500 uppercase tracking-wider mb-1 ml-1"><i class="fa-solid fa-money-bill-transfer mr-1"></i> Currency Link (XE)</span>
                            <div class="flex items-center gap-2">
                                <input type="url" placeholder="Paste XE link here..." value="${currLink}" onchange="updateCountryLink('${continentName}', '${escAttr(countryName)}', 'currencyLink', this.value, event)" class="w-full bg-white border border-blue-200 text-blue-800 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-xs">
                                <a href="${currLink || '#'}" target="${currLink ? '_blank' : '_self'}" class="w-9 h-9 shrink-0 bg-blue-600 text-white rounded-xl flex items-center justify-center hover:bg-blue-700 transition shadow-sm"><i class="fa-solid fa-arrow-right"></i></a>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 bg-slate-50 p-2 pl-4 rounded-2xl border border-slate-200 focus-within:border-red-300 transition-all">
                            <i class="fa-brands fa-youtube text-red-500 text-xl w-6 text-center"></i>
                            <input type="url" placeholder="Paste YouTube link here..." value="${ytLink}" onchange="updateCountryLink('${continentName}', '${escAttr(countryName)}', 'youtube', this.value, event)" class="flex-grow bg-transparent text-sm focus:outline-none text-slate-700 font-medium w-full min-w-0">
                            <a href="${ytLink || '#'}" target="${ytLink ? '_blank' : '_self'}" class="w-10 h-10 shrink-0 bg-white text-slate-400 rounded-xl border border-slate-200 flex items-center justify-center hover:text-red-500 transition"><i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                        
                        <div class="flex items-center gap-3 bg-slate-50 p-2 pl-4 rounded-2xl border border-slate-200 focus-within:border-sky-300 transition-all">
                            <i class="fa-brands fa-telegram text-sky-500 text-xl w-6 text-center"></i>
                            <input type="url" placeholder="Paste Telegram link here..." value="${tgLink}" onchange="updateCountryLink('${continentName}', '${escAttr(countryName)}', 'telegram', this.value, event)" class="flex-grow bg-transparent text-sm focus:outline-none text-slate-700 font-medium w-full min-w-0">
                            <a href="${tgLink || '#'}" target="${tgLink ? '_blank' : '_self'}" class="w-10 h-10 shrink-0 bg-white text-slate-400 rounded-xl border border-slate-200 flex items-center justify-center hover:text-sky-500 transition"><i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                        
                        <div class="flex items-center gap-3 bg-slate-50 p-2 pl-4 rounded-2xl border border-slate-200 focus-within:border-yellow-300 transition-all md:col-span-4 lg:col-span-1">
                            <i class="fa-solid fa-note-sticky text-yellow-500 text-xl w-6 text-center"></i>
                            <input type="url" placeholder="Paste Google Keep link..." value="${keepLink}" onchange="updateCountryLink('${continentName}', '${escAttr(countryName)}', 'keep', this.value, event)" class="flex-grow bg-transparent text-sm focus:outline-none text-slate-700 font-medium w-full min-w-0">
                            <a href="${keepLink || '#'}" target="${keepLink ? '_blank' : '_self'}" class="w-10 h-10 shrink-0 bg-white text-slate-400 rounded-xl border border-slate-200 flex items-center justify-center hover:text-yellow-500 transition"><i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Country Additional Notes -->
                <div class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl border border-slate-200 shadow-sm mb-10 fade-in">
                    <div class="flex items-center justify-between mb-5">
                        <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-blue-500"></i> Additional Notes</h3>
                        <button onclick="openAddModal('${continentName}', '${escAttr(countryName)}', null, 'notes')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition font-bold"><i class="fa-solid fa-plus mr-1"></i> Add Note</button>
                    </div>
                    ${formatList(countryData.notes, "notes", "text-slate-700", "text-blue-500", continentName, countryName, null)}
                </div>
            `;

            if (countryData.cities && countryData.cities.length > 0) {
                html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">`;
                countryData.cities.forEach((city, index) => {
                    const escCity = escAttr(city.name);
                    html += `
                        <div class="bg-white/90 backdrop-blur-md border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between group relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-9xl opacity-5 text-slate-900 font-bold italic pointer-events-none">#${index+1}</div>
                            
                            <div onclick="renderCityDetails('${continentName}', '${escAttr(countryName)}', '${escCity}')" class="flex items-center gap-4 cursor-pointer mb-2">
                                <div class="w-12 h-12 rounded-xl bg-slate-50 border border-slate-100 text-slate-500 flex items-center justify-center text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300 shadow-inner shrink-0">
                                    <i class="fa-solid fa-city"></i>
                                </div>
                                <h3 class="text-xl font-bold text-slate-800 truncate">${escHtml(city.name)}</h3>
                            </div>

                            <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100">
                                <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md">City #${index+1}</span>
                                <button onclick="promptDeleteCity('${continentName}', '${escAttr(countryName)}', ${index}, event)" class="text-slate-300 hover:text-rose-500 hover:bg-rose-50 w-8 h-8 rounded-lg flex items-center justify-center transition-all opacity-0 group-hover:opacity-100 focus:opacity-100" title="Delete City">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                html += `
                    <div class="bg-white/80 backdrop-blur-md rounded-3xl border border-slate-200 p-12 text-center fade-in shadow-sm max-w-2xl mx-auto">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300 text-3xl border border-slate-100">
                            <i class="fa-solid fa-folder-open"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-700 mb-2">No Cities Listed</h3>
                        <p class="text-slate-500">Add a city using the button above.</p>
                    </div>
                `;
            }
            contentEl.innerHTML = html;
        };

        window.renderCityDetails = (continentName, countryName, cityName) => {
            state.view = 'details';
            state.city = cityName;
            window.updateBreadcrumb();

            const countryData = dbTemplate[continentName].countries.find(c => c.name === countryName);
            const cityData = countryData.cities.find(c => c.name === cityName);
            
            window.setBackground(null);
            
            const wikiLink = `https://ar.wikipedia.org/wiki/${encodeURIComponent(cityName)}`;

            let html = `
                <div class="mb-8 fade-in relative text-center">
                    <div class="absolute right-0 top-0">
                        <button onclick="openAddModal('${continentName}', '${escAttr(countryName)}', '${escAttr(cityName)}', 'hotels')" class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2 font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> Add Item
                        </button>
                    </div>
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight flex items-center justify-center gap-3">
                        ${escHtml(cityName)}
                        <a href="https://maps.google.com/?q=${encodeURIComponent(cityName + ', ' + countryName)}" target="_blank" class="text-slate-300 hover:text-emerald-500 transition-colors text-3xl ml-1" title="Open in Google Maps">
                            <i class="fa-solid fa-map-location-dot"></i>
                        </a>
                    </h2>
                    <p class="text-slate-500 font-medium mt-1">${escHtml(countryName)}, ${continentName}</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                    
                    <!-- City Info / Wikipedia -->
                    <div class="bg-teal-50/80 backdrop-blur-sm border border-teal-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-teal-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-circle-info text-teal-600"></i> City Info</h3>
                        <a href="${wikiLink}" target="_blank" class="w-full h-[calc(100%-44px)] min-h-[120px] bg-slate-50 hover:bg-slate-100 p-6 rounded-2xl border border-slate-100 shadow-inner transition-colors group text-center flex flex-col items-center justify-center gap-3">
                            <i class="fa-brands fa-wikipedia-w text-4xl text-slate-400 group-hover:text-slate-600 transition"></i>
                            <span class="font-bold text-slate-700 text-sm">Read on Wikipedia (AR)</span>
                        </a>
                    </div>

                    <!-- Airports List -->
                    <div class="bg-purple-50/80 backdrop-blur-sm border border-purple-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-purple-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-plane-departure text-purple-500"></i> Airports</h3>
                        ${formatList(cityData.airports, "airports", "text-purple-900", "text-purple-600", continentName, countryName, cityName)}
                    </div>

                    <!-- Weather List -->
                    <div class="bg-sky-50/80 backdrop-blur-sm border border-sky-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-sky-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-cloud-sun text-sky-500"></i> Weather</h3>
                        ${formatList(cityData.weather, "weather", "text-sky-900", "text-sky-600", continentName, countryName, cityName)}
                    </div>

                    <!-- Hotels -->
                    <div class="bg-orange-50/80 backdrop-blur-sm border border-orange-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-orange-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-bed text-orange-500"></i> Hotels</h3>
                        ${formatList(cityData.hotels, "hotels", "text-orange-900", "text-orange-500", continentName, countryName, cityName)}
                    </div>

                    <!-- Restaurants -->
                    <div class="bg-amber-50/80 backdrop-blur-sm border border-amber-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-amber-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-utensils text-amber-500"></i> Restaurants</h3>
                        ${formatList(cityData.restaurants, "restaurants", "text-amber-900", "text-amber-500", continentName, countryName, cityName)}
                    </div>

                    <!-- Transportation -->
                    <div class="bg-indigo-50/80 backdrop-blur-sm border border-indigo-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-indigo-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-train text-indigo-500"></i> Transportation</h3>
                        ${formatList(cityData.transportation, "transportation", "text-indigo-900", "text-indigo-500", continentName, countryName, cityName)}
                    </div>

                    <!-- Activities -->
                    <div class="bg-emerald-50/80 backdrop-blur-sm border border-emerald-100 rounded-3xl p-6 shadow-sm">
                        <h3 class="text-lg font-bold text-emerald-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-ticket text-emerald-500"></i> Activities</h3>
                        ${formatList(cityData.activities, "activities", "text-emerald-900", "text-emerald-500", continentName, countryName, cityName)}
                    </div>

                    <!-- Shopping -->
                    <div class="bg-violet-50/80 backdrop-blur-sm border border-violet-100 rounded-3xl p-6 shadow-sm lg:col-span-2">
                        <h3 class="text-lg font-bold text-violet-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-bag-shopping text-violet-500"></i> Shopping</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8">
                            ${formatList(cityData.shopping, "shopping", "text-violet-900", "text-violet-500", continentName, countryName, cityName)}
                        </div>
                    </div>

                    <!-- Additional Notes -->
                    <div class="bg-teal-50/80 backdrop-blur-sm border border-teal-100 rounded-3xl p-6 shadow-sm lg:col-span-3">
                        <h3 class="text-lg font-bold text-teal-900 flex items-center gap-2 mb-5"><i class="fa-solid fa-pen-to-square text-teal-600"></i> Additional Notes</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-x-8">
                            ${formatList(cityData.notes, "notes", "text-teal-900", "text-teal-600", continentName, countryName, cityName)}
                        </div>
                    </div>

                </div>
            `;
            contentEl.innerHTML = html;
        };

        window.updateBreadcrumb = () => {
            // 1. رابط للعودة إلى الصفحة الرئيسية للمستودع (index.html)
            let html = `<a href="index.html" class="hover:text-emerald-600 transition font-bold" title="العودة للمستودع الرئيسي"><i class="fa-solid fa-house mr-1"></i> Home</a>`;
            
            // 2. فاصل ثم رابط لصفحة القارات داخل قسم السفر
            html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <button onclick="renderContinents()" class="hover:text-slate-900 transition font-medium">Travel Archive</button>`;
            
            if (state.view === 'trips' || state.view === 'tripDetails') {
                html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <button onclick="renderTrips()" class="hover:text-slate-900 transition">Next Trip</button>`;
                if(state.tripId) {
                    const trip = tripsData.find(t=>t.id === state.tripId);
                    if(trip) html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <span class="text-emerald-600 font-bold">${escHtml(trip.name)}</span>`;
                }
            } else {
                if (state.continent) {
                    html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <button onclick="renderCountries('${escAttr(state.continent)}')" class="hover:text-slate-900 transition">${escHtml(state.continent)}</button>`;
                }
                if (state.country) {
                    const countryData = dbTemplate[state.continent].countries.find(c => c.name === state.country);
                    html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <button onclick="renderCities('${escAttr(state.continent)}', '${escAttr(state.country)}', '${countryData.iso}')" class="hover:text-slate-900 transition">${escHtml(state.country)}</button>`;
                }
                if (state.city) {
                    html += `<i class="fa-solid fa-chevron-right text-[10px] mx-2 text-slate-300"></i> <span class="text-blue-600 font-bold">${escHtml(state.city)}</span>`;
                }
            }
            
            breadcrumbEl.innerHTML = html;
        };

        // --- MODAL & DELETE LOGIC ---
        let currentEditContext = null;
        let deleteContext = null;
        let cityAddContext = null;

        window.openAddModal = (continent, country, city, defaultCategory = 'hotels') => {
            currentEditContext = { continent, country, city };
            const catContainer = document.getElementById('category-container');
            const catSelect = document.getElementById('new-item-category');

            if (!city) {
                // Country view note
                catContainer.classList.add('hidden');
                document.getElementById('modal-category-title').textContent = "Note";
            } else {
                catContainer.classList.remove('hidden');
                catSelect.value = defaultCategory;
                document.getElementById('modal-category-title').textContent = "Item";
            }

            document.getElementById('modal-action-title').textContent = 'Add';
            document.getElementById('modal-save-btn').textContent = 'Save Item';
            document.getElementById('new-item-name').value = '';
            document.getElementById('new-item-link').value = '';
            document.getElementById('new-item-notes').value = '';
            document.getElementById('add-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('new-item-name').focus(), 100);
        };

        window.openEditModal = (continent, country, city, category, index) => {
            currentEditContext = { continent, country, city, category, index, isEdit: true };
            const catContainer = document.getElementById('category-container');

            // Locate the item
            let arr;
            if (city) {
                const cityData = dbTemplate[continent].countries.find(c => c.name === country).cities.find(c => c.name === city);
                arr = cityData[category];
            } else {
                arr = dbTemplate[continent].countries.find(c => c.name === country).notes;
            }
            let item = arr && arr[index];
            if (typeof item === 'string') item = { name: item };
            if (!item) return;

            // Category is locked during edit to keep the item in place
            catContainer.classList.add('hidden');
            document.getElementById('modal-action-title').textContent = 'Edit';
            document.getElementById('modal-category-title').textContent = city ? 'Item' : 'Note';
            document.getElementById('modal-save-btn').textContent = 'Update Item';
            document.getElementById('new-item-name').value = item.name || '';
            document.getElementById('new-item-link').value = item.link || '';
            document.getElementById('new-item-notes').value = item.notes || '';
            document.getElementById('add-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('new-item-name').focus(), 100);
        };

        window.closeAddModal = () => {
            document.getElementById('add-modal').classList.add('hidden');
            currentEditContext = null;
        };

        window.openAddCityModal = (continent, country) => {
            cityAddContext = { continent, country };
            document.getElementById('new-city-name').value = '';
            document.getElementById('add-city-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('new-city-name').focus(), 100);
        };

        window.closeAddCityModal = () => {
            document.getElementById('add-city-modal').classList.add('hidden');
            cityAddContext = null;
        };

        window.saveNewCity = async () => {
            const name = document.getElementById('new-city-name').value.trim();
            if (!name || !cityAddContext) return;

            const { continent, country } = cityAddContext;
            const countryData = dbTemplate[continent].countries.find(c => c.name === country);
            
            if(countryData.cities.find(c => c.name.toLowerCase() === name.toLowerCase())) {
                window.showToast("City already exists", "bg-amber-500", "fa-triangle-exclamation");
                return closeAddCityModal();
            }

            countryData.cities.push(initCityObj(name));
            closeAddCityModal();
            window.renderCities(continent, country, countryData.iso);
            window.showToast("City added successfully!", "bg-emerald-600", "fa-circle-check");
            await syncCountryToCloud(continent, country);
        };

        window.saveNewItem = async () => {
            const name = document.getElementById('new-item-name').value.trim();
            const link = document.getElementById('new-item-link').value.trim();
            const notes = document.getElementById('new-item-notes').value.trim();

            if (!name || !currentEditContext) return;

            const { continent, country, city, isEdit } = currentEditContext;

            const newItem = { name };
            if (link) newItem.link = link;
            if (notes) newItem.notes = notes;

            // --- EDIT MODE: update item in place ---
            if (isEdit) {
                const category = currentEditContext.category;
                const index = currentEditContext.index;
                const target = city
                    ? dbTemplate[continent].countries.find(c => c.name === country).cities.find(c => c.name === city)
                    : dbTemplate[continent].countries.find(c => c.name === country);
                if (typeof target[category] === 'string') target[category] = [{ name: target[category] }];
                if (Array.isArray(target[category]) && target[category][index] !== undefined) {
                    target[category][index] = newItem;
                }
                closeAddModal();
                if (city) {
                    window.renderCityDetails(continent, country, city);
                    window.showToast("Item updated!", "bg-blue-600", "fa-pen");
                    await syncToCloud(continent, country, city);
                } else {
                    window.renderCities(continent, country, dbTemplate[continent].countries.find(c => c.name === country).iso);
                    window.showToast("Note updated!", "bg-blue-600", "fa-pen");
                    await syncCountryToCloud(continent, country);
                }
                return;
            }

            // --- ADD MODE ---
            let category = !city ? 'notes' : document.getElementById('new-item-category').value;

            if (city) {
                const cityData = dbTemplate[continent].countries.find(c => c.name === country).cities.find(c => c.name === city);
                if (!cityData[category]) cityData[category] = [];
                else if (typeof cityData[category] === 'string') cityData[category] = [{ name: cityData[category] }];
                
                cityData[category].push(newItem);
                
                closeAddModal();
                window.renderCityDetails(continent, country, city);
                window.showToast("Added successfully!", "bg-emerald-600", "fa-circle-check");
                await syncToCloud(continent, country, city);
            } else {
                const countryData = dbTemplate[continent].countries.find(c => c.name === country);
                if (!countryData.notes) countryData.notes = [];
                
                countryData.notes.push(newItem);
                
                closeAddModal();
                window.renderCities(continent, country, countryData.iso);
                window.showToast("Note added successfully!", "bg-emerald-600", "fa-circle-check");
                await syncCountryToCloud(continent, country);
            }
        };

        window.promptDelete = (continent, country, city, category, index) => {
            deleteContext = { continent, country, city, category, index };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirmModal = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            deleteContext = null;
        };

        window.executeDelete = async () => {
            if (!deleteContext) return;
            
            if(deleteContext.isTrip) {
                await deleteTripFromCloud(deleteContext.tripId);
                closeConfirmModal();
                window.showToast("Trip deleted", "bg-rose-600", "fa-trash-can");
                if(state.view === 'trips') window.renderTrips();
                return;
            }

            if(deleteContext.isCity) {
                const { continent, country, index } = deleteContext;
                const countryData = dbTemplate[continent].countries.find(c => c.name === country);
                countryData.cities.splice(index, 1);
                closeConfirmModal();
                window.renderCities(continent, country, countryData.iso);
                window.showToast("City deleted", "bg-rose-600", "fa-trash-can");
                await syncCountryToCloud(continent, country);
                return;
            }

            const { continent, country, city, category, index } = deleteContext;
            
            if (city) {
                const cityData = dbTemplate[continent].countries.find(c => c.name === country).cities.find(c => c.name === city);
                cityData[category].splice(index, 1);
                
                closeConfirmModal();
                window.renderCityDetails(continent, country, city);
                window.showToast("Item deleted", "bg-rose-600", "fa-trash-can");
                await syncToCloud(continent, country, city);
            } else {
                const countryData = dbTemplate[continent].countries.find(c => c.name === country);
                countryData[category].splice(index, 1);
                
                closeConfirmModal();
                window.renderCities(continent, country, countryData.iso);
                window.showToast("Note deleted", "bg-rose-600", "fa-trash-can");
                await syncCountryToCloud(continent, country);
            }
        };

        window.promptDeleteCity = (continent, country, index, event) => {
            event.stopPropagation();
            deleteContext = { isCity: true, continent, country, index };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.showToast = (msg, colorClass = "bg-emerald-600", iconClass = "fa-circle-check") => {
            const toast = document.getElementById('toast-notification');
            const icon = document.getElementById('toast-icon');
            toast.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 ${colorClass} text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 z-[100] flex items-center gap-3`;
            icon.className = `fa-solid ${iconClass}`;
            document.getElementById('toast-message').textContent = msg;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 3000);
        };

        // --- Keyboard shortcuts: Esc closes modals, Enter submits ---
        document.addEventListener('keydown', (e) => {
            const open = (id) => !document.getElementById(id).classList.contains('hidden');
            if (e.key === 'Escape') {
                closeAddModal(); closeAddCityModal(); closeAddTripModal(); closeConfirmModal();
            } else if (e.key === 'Enter') {
                if (open('confirm-modal')) { e.preventDefault(); executeDelete(); }
                else if (open('add-modal')) { e.preventDefault(); saveNewItem(); }
                else if (open('add-city-modal')) { e.preventDefault(); saveNewCity(); }
                else if (open('add-trip-modal')) { e.preventDefault(); saveNewTrip(); }
            }
        });

        window.onload = () => {
            loadLocal();
            window.renderContinents();
            setupFirebase();
        };

    </script>
</body>
</html>
