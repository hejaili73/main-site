<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Privacy and Security Guardrail -->
    <meta name="robots" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        tailwind.config = {

    <style>
        /* ===== Warm, low-glare reading palette (light) ===== */
        :root {
            --page-bg: #f4efe6;
            --surface: #fdfbf6;
            --surface-alt: #f9f5ec;
            --ink: #3f3a33;
            --ink-strong: #2c2823;
            --ink-soft: #6b645a;
            --border: #e7e0d3;
            --border-strong: #d8cfbe;
            --shadow: rgba(80, 60, 30, 0.12);
            --bg-wash: 0.55;

            /* Category panels — colored borders & headings (surface is unified) */
            --panel-rose: #fbe1e1;    --bd-rose: #f3cccc;    --tx-rose: #9f1239;
            --panel-amber: #f9eccf;   --bd-amber: #efdcb0;   --tx-amber: #92400e;
            --panel-indigo: #e4e4f6;  --bd-indigo: #cdcdee;  --tx-indigo: #3730a3;
            --panel-emerald: #d9efe2; --bd-emerald: #bfe3cf; --tx-emerald: #065f46;
            --panel-fuchsia: #f7e2f4; --bd-fuchsia: #eecbe9; --tx-fuchsia: #86198f;
            --panel-sky: #ddeefb;     --bd-sky: #c3dff5;     --tx-sky: #075985;
            --panel-purple: #eee2f8;  --bd-purple: #ddc9f0;  --tx-purple: #6b21a8;
            --panel-slate: #efe9db;   --bd-slate: #ddd5c6;   --tx-slate: #334155;
            --panel-blue: #e6f1fb;    --bd-blue: #cfe2f5;
            --panel-orange: #fbe8d5;  --bd-orange: #f3d3ac;  --tx-orange: #9a3412;
            --panel-violet: #e9e5fa;  --bd-violet: #d4ccf3;  --tx-violet: #5b21b6;
            --panel-teal: #d4eeea;    --bd-teal: #b3e0d9;    --tx-teal: #115e59;
            --inner: rgba(255,255,255,0.5);

            /* Visited country highlight */
            --visited-bg: #dcefe0;     --visited-bd: #57b27a;   --visited-tx: #1f6b42;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease-in-out, opacity 0.8s ease-in-out;
            opacity: 0.05;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2000');
        }
        #dynamic-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--page-bg);
            opacity: var(--bg-wash);
            mix-blend-mode: multiply;
        }

        /* ---- Map Tailwind neutral utilities onto theme variables ---- */
        .bg-white { background-color: var(--surface) !important; }
        .bg-slate-50 { background-color: var(--surface-alt) !important; }
        .bg-white\/90, .bg-white\/80 { background-color: var(--surface) !important; }
        .bg-white\/50 { background-color: var(--inner) !important; }
        .text-slate-800 { color: var(--ink) !important; }
        .text-slate-700 { color: var(--ink) !important; }
        .text-slate-600, .text-slate-500 { color: var(--ink-soft) !important; }
        .text-slate-400, .text-slate-300 { color: var(--ink-soft) !important; }
        .border-slate-200 { border-color: var(--border) !important; }
        .border-slate-100 { border-color: var(--border) !important; }

        /* ---- Category panels: UNIFIED surface, colored borders + headings only ---- */
        .bg-rose-50\/80,
        .bg-amber-50\/80,
        .bg-indigo-50\/80,
        .bg-emerald-50\/80,
        .bg-fuchsia-50\/80,
        .bg-sky-50\/80,
        .bg-purple-50\/80,
        .bg-slate-50\/80,
        .bg-orange-50\/80,
        .bg-violet-50\/80,
        .bg-teal-50\/80    { background-color: var(--surface) !important; }
        .border-rose-100    { border-color: var(--bd-rose) !important; }
        .border-amber-100   { border-color: var(--bd-amber) !important; }
        .border-indigo-100  { border-color: var(--bd-indigo) !important; }
        .border-emerald-100 { border-color: var(--bd-emerald) !important; }
        .border-fuchsia-100 { border-color: var(--bd-fuchsia) !important; }
        .border-sky-100     { border-color: var(--bd-sky) !important; }
        .border-purple-100  { border-color: var(--bd-purple) !important; }
        .border-orange-100  { border-color: var(--bd-orange) !important; }
        .border-violet-100  { border-color: var(--bd-violet) !important; }
        .border-teal-100    { border-color: var(--bd-teal) !important; }

        /* Panel heading text — keep readable on dark panels */
        .text-rose-900    { color: var(--tx-rose) !important; }
        .text-amber-900   { color: var(--tx-amber) !important; }
        .text-indigo-900  { color: var(--tx-indigo) !important; }
        .text-emerald-900 { color: var(--tx-emerald) !important; }
        .text-fuchsia-900 { color: var(--tx-fuchsia) !important; }
        .text-sky-900     { color: var(--tx-sky) !important; }
        .text-purple-900  { color: var(--tx-purple) !important; }
        .text-orange-900  { color: var(--tx-orange) !important; }
        .text-violet-900  { color: var(--tx-violet) !important; }
        .text-teal-900    { color: var(--tx-teal) !important; }

        /* Small info tiles (currency / embassy / youtube etc.) reuse pale tints too */
        .bg-blue-50    { background-color: var(--panel-blue) !important; }
        .bg-emerald-50 { background-color: var(--panel-emerald) !important; }
        .bg-indigo-50  { background-color: var(--panel-indigo) !important; }
        .bg-amber-50   { background-color: var(--panel-amber) !important; }
        .bg-rose-50    { background-color: var(--panel-rose) !important; }
        .border-blue-100    { border-color: var(--bd-blue) !important; }
        .border-emerald-100 { border-color: var(--bd-emerald) !important; }

        /* Neutral chips, number badges & buttons */
        .bg-slate-100 { background-color: var(--surface-alt) !important; }
        .hover\:bg-slate-200:hover { background-color: var(--border) !important; }
        .text-slate-900 { color: var(--ink-strong) !important; }
        /* Dark action buttons (Add Item / Save) keep contrast in both modes */
        .bg-slate-900 { background-color: var(--ink-strong) !important; }
        .bg-slate-900.text-white, .bg-slate-900 { color: var(--page-bg) !important; }
        .hover\:bg-slate-800:hover { background-color: var(--ink) !important; }
        /* The big faded "#1" watermark numbers — keep them subtle, not invisible */
        .text-slate-900.opacity-5 { color: var(--ink) !important; }
        /* Colored input text (currency/embassy fields) — readable on dark surface */
        .text-blue-800 { color: var(--tx-sky) !important; }
        .text-emerald-800 { color: var(--tx-emerald) !important; }
        .border-blue-200 { border-color: var(--bd-blue) !important; }
        .border-emerald-200 { border-color: var(--bd-emerald) !important; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -5px var(--shadow);
            border-color: var(--border-strong);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }

        .timeline-hide-scroll::-webkit-scrollbar { display: none; }
        .timeline-hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Visited country card — white bg, marked via border + toggle only */
        .visited-card {
            background-color: var(--surface) !important;
            border-color: var(--visited-bd) !important;
        }
        .visited-card .flag-img { box-shadow: 0 0 0 2px var(--visited-bd); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="dynamic-bg"></div>

    <!-- Simplified Navbar (Breadcrumbs) -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4">
            <div id="breadcrumb" class="text-sm font-semibold text-slate-600 flex items-center gap-2 overflow-x-auto whitespace-nowrap">
                <!-- Injected via JS -->
            </div>
            <div id="cloud-status" class="hidden text-[10px] font-bold text-emerald-600 flex items-center gap-1 px-3 py-1.5 bg-emerald-50 rounded-full border border-emerald-100 whitespace-nowrap shadow-sm shrink-0">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span class="hidden sm:inline">Auto-Save On</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="app-content"></main>

    <footer class="bg-white/80 border-t border-slate-200 py-6 mt-auto backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 text-center flex flex-col md:flex-row justify-between items-center gap-2">
            <p class="text-slate-500 text-sm font-medium tracking-wide">&copy; <span id="currentYear"></span> hejaili.com | 150 Countries Repository</p>
            <p class="text-xs text-slate-400 flex items-center gap-1"><i class="fa-solid fa-shield-halved"></i> Your data is saved privately on this device &amp; synced to your cloud</p>
        </div>
    </footer>

    <!-- Hidden file input for backup import -->
    <input type="file" id="import-file" accept="application/json,.json" onchange="importData(this)" class="hidden">

    <!-- Add Item Modal -->
    <div id="add-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-slate-800"><span id="modal-action-title">Add</span> <span id="modal-category-title" class="text-blue-600 capitalize"></span></h3>
                <button onclick="closeAddModal()" class="text-slate-400 hover:text-rose-500 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4 mb-6">
                <div id="category-container">
                    <label class="block text-xs font-bold text-slate-500 mb-1">Category <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <select id="new-item-category" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium appearance-none cursor-pointer">
                            <option value="airports">Airports / Flightradar24</option>
                            <option value="weather">Weather / AccuWeather</option>
                            <option value="hotels">Hotels</option>
                            <option value="restaurants">Restaurants</option>
                            <option value="transportation">Transportation</option>
                            <option value="activities">Activities</option>
                            <option value="shopping">Shopping</option>
                            <option value="notes">Additional Notes</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Name / Note <span class="text-rose-500">*</span></label>
                    <input type="text" id="new-item-name" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Type here...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Link <span class="font-normal opacity-70">(Optional)</span></label>
                    <input type="url" id="new-item-link" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="https://...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Extra Notes <span class="font-normal opacity-70">(Optional)</span></label>
                    <input type="text" id="new-item-notes" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g., Close to train station...">
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="saveNewItem()" id="modal-save-btn" class="flex-1 bg-slate-900 text-white rounded-xl py-3 font-semibold hover:bg-slate-800 transition">Save Item</button>
                <button onclick="closeAddModal()" class="px-6 bg-slate-100 text-slate-600 rounded-xl font-semibold hover:bg-slate-200 transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add City Modal -->
    <div id="add-city-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-all text-center">
            <h3 class="text-xl font-bold text-slate-800 mb-4">Add New City</h3>
            <input type="text" id="new-city-name" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Kyoto">
            <div class="flex gap-3">
                <button onclick="saveNewCity()" class="flex-1 bg-blue-600 text-white rounded-xl py-3 font-semibold hover:bg-blue-700 transition">Add City</button>
                <button onclick="closeAddCityModal()" class="flex-1 bg-slate-100 text-slate-600 rounded-xl py-3 font-semibold hover:bg-slate-200 transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Next Trip Modal (Date Integration) -->
    <div id="add-trip-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-all text-center">
            <h3 class="text-xl font-bold text-slate-800 mb-4">Create New Trip</h3>
            <div class="space-y-4 mb-6 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Trip Name</label>
                    <input type="text" id="new-trip-name" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="e.g., Summer Europe Tour">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Start Date <span class="text-rose-500">*</span></label>
                        <input type="date" id="new-trip-date" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Total Days</label>
                        <input type="number" id="new-trip-days" min="1" max="60" value="14" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="saveNewTrip()" class="flex-1 bg-emerald-600 text-white rounded-xl py-3 font-semibold hover:bg-emerald-700 transition">Create Trip</button>
                <button onclick="closeAddTripModal()" class="flex-1 bg-slate-100 text-slate-600 rounded-xl py-3 font-semibold hover:bg-slate-200 transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white border border-rose-100 rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-all text-center">
            <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 border border-rose-100"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Delete?</h3>
            <p class="text-slate-500 text-sm mb-6">Are you sure you want to delete this? This action will be saved automatically.</p>
            <div class="flex gap-3">
                <button onclick="executeDelete()" class="flex-1 bg-rose-600 text-white rounded-xl py-3 font-semibold hover:bg-rose-700 transition">Yes, Delete</button>
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-600 rounded-xl py-3 font-semibold hover:bg-slate-200 transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast-notification" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 translate-y-24 opacity-0 z-[100] flex items-center gap-3">
        <i id="toast-icon" class="fa-solid fa-circle-check"></i>
        <span id="toast-message" class="text-sm font-medium">Action successful!</span>
    </div>

        // Initialize Firebase
        const setupFirebase = async () => {
            try {
                const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                if (!firebaseConfigStr || firebaseConfigStr === '{}') return; 
                
                const app = initializeApp(JSON.parse(firebaseConfigStr));
                const auth = getAuth(app);
                dbFirestore = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserId = user.uid;
                        document.getElementById('cloud-status').classList.remove('hidden');
                        loadCloudData();
                    }
                });
            } catch (e) { console.warn("Cloud features disabled.", e); }
        };

        const loadCloudData = () => {
            if (!currentUserId || !dbFirestore) return;
            
            // 1. Sync Cities Data
            const citiesRef = collection(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_cities');
            onSnapshot(citiesRef, (snapshot) => {
                snapshot.forEach(doc => {
                    const parts = doc.id.split('___');
                    if(parts.length === 3) {
                        const [continent, country, city] = parts;
                        const cData = dbTemplate[continent]?.countries.find(c => c.name === country);
                        const cityData = cData?.cities.find(c => c.name === city);
                        if (cityData) {
                            const data = doc.data();
                            cityData.hotels = data.hotels || [];
                            cityData.restaurants = data.restaurants || [];
                            cityData.transportation = data.transportation || [];
                            cityData.activities = data.activities || [];
                            cityData.shopping = data.shopping || [];
                            cityData.notes = data.notes || [];
                            cityData.airports = Array.isArray(data.airports) ? data.airports : [];
                            cityData.weather = Array.isArray(data.weather) ? data.weather : [];
                        }
                    }
                });
                if(state.view === 'details') window.renderCityDetails(state.continent, state.country, state.city);
            });

            // 2. Sync Countries Data (Visited status, links, notes)
            const countriesRef = collection(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_countries');
            onSnapshot(countriesRef, (snapshot) => {
                snapshot.forEach(doc => {
                    const parts = doc.id.split('___');
                    if(parts.length === 2) {
                        const [continent, country] = parts;
                        const cData = dbTemplate[continent]?.countries.find(c => c.name === country);
                        if (cData) {
                            const data = doc.data();
                            if (!cData.info) cData.info = {};
                            if (data.currencyLink) cData.info.currencyLink = data.currencyLink;
                            if (data.youtube) cData.info.youtube = data.youtube;
                            if (data.telegram) cData.info.telegram = data.telegram;
                            if (data.keep) cData.info.keep = data.keep;
                            if (data.embassy) cData.info.embassy = data.embassy;
                            cData.notes = data.notes || [];
                            cData.visited = data.visited || false;
                            
                            // Safe merge custom added cities
                            if (data.citiesList) {
                                data.citiesList.forEach(cityName => {
                                    let existing = cData.cities.find(c => c.name === cityName);
                                    if (!existing) {
                                        cData.cities.push({ ...initCityObj(cityName) });
                                    }
                                });
                            }
                        }
                    }
                });
                if(state.view === 'cities') {
                    const isoCode = dbTemplate[state.continent].countries.find(c=>c.name===state.country).iso;
                    window.renderCities(state.continent, state.country, isoCode);
                } else if(state.view === 'countries') {
                    window.renderCountries(state.continent);
                }
            });

            // 3. Sync Trips Data
            const tripsRef = collection(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_trips');
            onSnapshot(tripsRef, (snapshot) => {
                tripsData = [];
                snapshot.forEach(doc => {
                    tripsData.push({ id: doc.id, ...doc.data() });
                });
                tripsData.sort((a,b) => a.createdAt - b.createdAt);
                
                if(state.view === 'trips') window.renderTrips();
                if(state.view === 'tripDetails') window.renderTripPlanner(state.tripId);
            });
        };

        const syncToCloud = async (continent, country, city) => {
            saveLocal();
            if (!currentUserId || !dbFirestore) return;
            const docId = `${continent}___${country}___${city}`;
            const cityData = dbTemplate[continent].countries.find(c => c.name === country).cities.find(c => c.name === city);
            
            try {
                const docRef = doc(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_cities', docId);
                await setDoc(docRef, {
                    hotels: cityData.hotels || [],
                    restaurants: cityData.restaurants || [],
                    transportation: cityData.transportation || [],
                    activities: cityData.activities || [],
                    shopping: cityData.shopping || [],
                    notes: cityData.notes || [],
                    airports: cityData.airports || [],
                    weather: cityData.weather || []
                });
            } catch (e) { console.error("Error saving", e); }
        };

        const syncCountryToCloud = async (continent, country) => {
            saveLocal();
            if (!currentUserId || !dbFirestore) return;
            const docId = `${continent}___${country}`;
            const countryData = dbTemplate[continent].countries.find(c => c.name === country);
            
            try {
                const docRef = doc(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_countries', docId);

        };

        const syncTripToCloud = async (trip) => {
            if (!currentUserId || !dbFirestore) {
                const idx = tripsData.findIndex(t => t.id === trip.id);
                if(idx > -1) tripsData[idx] = trip;
                else tripsData.push(trip);
                saveLocal();
                return;
            }
            saveLocal();
            try {
                const docRef = doc(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_trips', trip.id);
                await setDoc(docRef, trip);
            } catch (e) { console.error("Error saving trip", e); }
        };

        const deleteTripFromCloud = async (tripId) => {
            tripsData = tripsData.filter(t => t.id !== tripId);
            saveLocal();
            if (!currentUserId || !dbFirestore) {
                return;
            }
            try {
                await deleteDoc(doc(dbFirestore, 'artifacts', appId, 'users', currentUserId, 'travel_trips', tripId));
            } catch (e) { console.error("Error deleting trip", e); }
        };

        // --- Unified data appliers (used by cloud snapshots, local load & import) ---
        const applyCityData = (continent, country, city, data) => {
            const cData = dbTemplate[continent]?.countries.find(c => c.name === country);
            const cityData = cData?.cities.find(c => c.name === city);
            if (!cityData) return;
            ['hotels','restaurants','transportation','activities','shopping','notes','airports','weather']
                .forEach(k => { cityData[k] = Array.isArray(data[k]) ? data[k] : []; });
        };
        const applyCountryData = (continent, country, data) => {
            const cData = dbTemplate[continent]?.countries.find(c => c.name === country);
            if (!cData) return;
            if (!cData.info) cData.info = {};
            ['currencyLink','youtube','telegram','keep','embassy']
                .forEach(f => { if (data[f] !== undefined) cData.info[f] = data[f]; });
            cData.notes = Array.isArray(data.notes) ? data.notes : [];
            cData.visited = !!data.visited;
            if (Array.isArray(data.citiesList)) {
                data.citiesList.forEach(cityName => {
                    if (!cData.cities.find(c => c.name === cityName)) cData.cities.push({ ...initCityObj(cityName) });
                });
            }
        };

        // --- Local persistence (works fully offline / without Firebase) ---
        const buildSnapshot = () => {
            const cities = {}, countries = {};
            for (const cont in dbTemplate) {
                dbTemplate[cont].countries.forEach(co => {
                    countries[`${cont}___${co.name}`] = {
                        visited: co.visited || false,
                        currencyLink: co.info?.currencyLink || '',
                        youtube: co.info?.youtube || '',
                        telegram: co.info?.telegram || '',
                        keep: co.info?.keep || '',
                        embassy: co.info?.embassy || '',
                        notes: co.notes || [],
                        citiesList: co.cities.map(c => c.name)
                    };
                    co.cities.forEach(ci => {
                        const id = `${cont}___${co.name}___${ci.name}`;
                        cities[id] = {
                            hotels: ci.hotels||[], restaurants: ci.restaurants||[], transportation: ci.transportation||[],
                            activities: ci.activities||[], shopping: ci.shopping||[], notes: ci.notes||[],
                            airports: ci.airports||[], weather: ci.weather||[]
                        };
                    });
                });
            }
            return { cities, countries, trips: tripsData, savedAt: Date.now() };
        };
        const saveLocal = () => {
            try { localStorage.setItem(LOCAL_KEY, JSON.stringify(buildSnapshot())); } catch (e) { /* storage unavailable */ }
        };
        const applySnapshot = (parsed) => {
            if (!parsed) return;
            if (parsed.countries) for (const id in parsed.countries) { const p = id.split('___'); if (p.length === 2) applyCountryData(p[0], p[1], parsed.countries[id]); }
            if (parsed.cities) for (const id in parsed.cities) { const p = id.split('___'); if (p.length === 3) applyCityData(p[0], p[1], p[2], parsed.cities[id]); }
            if (Array.isArray(parsed.trips)) tripsData = parsed.trips;
        };
        const loadLocal = () => {
            try {
                const raw = localStorage.getItem(LOCAL_KEY);
                if (!raw) return false;
                applySnapshot(JSON.parse(raw));
                return true;
            } catch (e) { return false; }
        };

        // --- Backup export / import ---
        window.exportData = () => {
            saveLocal();
            const data = JSON.stringify(buildSnapshot(), null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `travel-archive-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);

                    saveLocal();
                    window.renderContinents();
                    window.showToast('Backup imported successfully!', 'bg-emerald-600', 'fa-circle-check');
