  links:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/>',
  linguistic:'<path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>'
};
/* أيقونة يوتيوب (شعار) */
const YT_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M23.5 6.2a3 3 0 0 0-2.11-2.13C19.5 3.55 12 3.55 12 3.55s-7.5 0-9.39.52A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.11 2.13c1.89.52 9.39.52 9.39.52s7.5 0 9.39-.52A3 3 0 0 0 23.5 17.8 31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.55 15.57V8.43L15.82 12z"/></svg>';

/* ---------- الشبكة ---------- */
function renderGrid(filter=''){
  $('#countPill').textContent=`${NAMES.length} اسمًا — مرتّبة ومرقّمة، بلا تكرار`;
  grid.innerHTML=''; const f=filter.trim();
  const list=NAMES.filter(x=>!f||x.name.includes(f)||String(x.n)===f);
  if(!list.length){ grid.innerHTML='<p class="col-span-full text-center text-brand-400 py-12 text-lg">لا يوجد اسمٌ مطابقٌ لبحثك.</p>'; return; }
  list.forEach(x=>{
    const t=document.createElement('button');
    t.type='button';
    t.className='group bg-paper-card border border-paper-deep rounded-2xl p-5 flex flex-col items-center gap-2 shadow-sm hover:border-gold-300 hover:shadow-md hover:-translate-y-1 transition-all focus:outline-none focus-visible:ring-4 focus-visible:ring-gold-500/25';
    t.innerHTML=`
      <span class="w-8 h-8 grid place-items-center rounded-full text-xs font-bold text-gold-700 bg-gold-50 border border-gold-100">${x.n}</span>
      <span class="font-naskh font-bold text-2xl sm:text-3xl text-brand-900">${x.name}</span>
      <span class="text-[11px] font-medium tracking-widest text-gold-700 opacity-0 group-hover:opacity-100 transition-opacity">افتح الصفحة ›</span>`;
    t.onclick=()=>location.hash='#/name/'+x.n;
    grid.appendChild(t);
  });
}

/* ---------- بطاقة حقل: عناصر مرقّمة + إضافة + حذف ---------- */
function lineIcon(p){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-5 h-5">${p}</svg>`; }
const TRASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6"/></svg>';
const PLUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m7-7H5"/></svg>';

let addingTo = null;   // اسم الحقل المفتوح للإضافة حاليًا
let currentN = null;   // رقم الاسم المعروض

function badge(i){ return `<span class="flex-none w-6 h-6 grid place-items-center rounded-full bg-gold-50 border border-gold-100 text-gold-700 text-[11px] font-bold">${i+1}</span>`; }
function delItemBtn(key,i){ return `<button data-del="${key}" data-i="${i}" type="button" aria-label="حذف البيان" class="flex-none w-7 h-7 grid place-items-center rounded-lg text-red-600 hover:bg-red-50 transition-colors">${TRASH}</button>`; }
function addItemBtn(key){ return `<button data-add="${key}" type="button" aria-label="إضافة بيان" title="إضافة" class="flex-none w-7 h-7 grid place-items-center rounded-lg text-gold-700 bg-gold-50 border border-gold-100 hover:bg-gold-100 hover:border-gold-300 transition-colors">${PLUS}</button>`; }

function itemRow(key, i, val, kind){
  let mid;
  if(kind==='youtube'){
    const emb=ytEmbed(val);
    mid = emb
      ? `<div class="flex-1 relative w-full rounded-xl overflow-hidden border border-paper-deep" style="aspect-ratio:16/9"><iframe class="absolute inset-0 w-full h-full" src="${emb}" title="YouTube" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`
      : `<a href="${val}" target="_blank" rel="noopener" class="flex-1 text-base text-gold-700 underline break-all">${val}</a>`;
  } else if(kind==='links'){
    mid = `<a href="${val.url}" target="_blank" rel="noopener" class="flex-1 inline-flex items-center gap-2 text-base font-medium text-gold-700 hover:text-gold-500 transition-colors break-all">${lineIcon(IC.links)}${val.label||val.url}</a>`;
  } else {
    const text = (val && typeof val==='object') ? (val.text||'') : val;
    const src  = (val && typeof val==='object') ? (val.src||'')  : '';
    const cls = kind==='quran' ? 'hadith-naskh text-xl md:text-2xl text-brand-900' : 'text-brand-800 text-lg md:text-xl leading-loose';
    mid = `<div class="flex-1">
        <p class="${cls}">${text}</p>
        ${src ? `<span class="ref-wrap"><button type="button" class="ref-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-3.5 h-3.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>المرجع</button><span class="ref-pop">${src}</span></span>` : ''}
      </div>`;
  }
  return `<li class="flex items-start gap-2.5">${badge(i)}${mid}${delItemBtn(key,i)}</li>`;
}

function editorBox(key, kind){
  const inputCls="w-full bg-paper border border-paper-deep rounded-lg px-3 py-2 text-sm focus-ring";
  let fields;
  if(kind==='links')      fields=`<input id="ed_label" class="${inputCls}" placeholder="وصف الرابط (اختياري)"><input id="ed_val" class="${inputCls}" placeholder="https://...">`;
  else if(kind==='youtube') fields=`<input id="ed_val" class="${inputCls}" placeholder="رابط يوتيوب أو معرّف الفيديو">`;
  else                    fields=`<textarea id="ed_val" rows="3" class="${inputCls}" placeholder="أدخل النص هنا…"></textarea>`;
  return `<div class="mt-3 space-y-2">
      ${fields}
      <div class="flex justify-end gap-2">
        <button data-cancel="1" type="button" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-gold-50 text-gold-700 border border-gold-100 hover:bg-gold-100">إلغاء</button>
        <button data-save="${key}" type="button" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-gold-500 text-ink hover:bg-gold-300">حفظ</button>
      </div>
    </div>`;
}

function fieldCard(x, key, title, iconSvg, kind, iconColor){
  const ic = iconColor||'text-gold-700';
  const items = x[key] || [];
  const list = items.length
    ? `<ol class="space-y-3">${items.map((v,i)=>itemRow(key,i,v,kind)).join('')}</ol>`
    : `<p class="text-brand-400 text-base">— لا توجد بيانات بعد. اضغط ＋ للإضافة. —</p>`;
  const editor = (addingTo===key) ? editorBox(key, kind) : '';
  return `<article class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-paper-deep hover:border-gold-300 hover:shadow-md transition-all mb-4">
      <div class="flex items-center gap-2.5 mb-3">
        <span class="w-9 h-9 grid place-items-center rounded-lg bg-gold-50 border border-gold-100 ${ic}">${iconSvg}</span>
        <h3 class="font-naskh font-bold text-xl text-gold-700 flex-1">${title}</h3>
        ${addItemBtn(key)}
      </div>
      ${list}
      ${editor}
    </article>`;
}

/* ---------- صفحة الاسم ---------- */
function renderDetail(n){
  const x=NAMES.find(e=>e.n===n);
  if(!x){ location.hash='#/'; return; }
  currentN=n;
  const idx=NAMES.indexOf(x);

  $('#detailBody').innerHTML = `
    <div class="text-center mb-8 animate-fadeUp">
      <span class="inline-grid place-items-center w-16 h-16 mx-auto mb-4 rounded-full border-2 border-gold-300 text-gold-700 font-bold text-xl bg-gold-50 shadow-sm">${x.n}</span>
      <h2 class="font-naskh font-bold text-5xl sm:text-6xl text-brand-900 title-rule">${x.name}</h2>
    </div>
    ${fieldCard(x,'meaning','معنى الاسم', lineIcon(IC.meaning),'text')}
    ${fieldCard(x,'linguistic','المعنى اللغوي', lineIcon(IC.linguistic),'text')}
    ${fieldCard(x,'evidence','الدليل', lineIcon(IC.evidence),'quran')}
    ${fieldCard(x,'explanation','شرح الاسم', lineIcon(IC.explanation),'text')}
    ${fieldCard(x,'benefits','فوائد معرفة الاسم', lineIcon(IC.benefits),'text')}
    ${fieldCard(x,'dua','الدعاء بهذا الاسم', lineIcon(IC.dua),'text')}
    ${fieldCard(x,'stories','قصة / قصص', lineIcon(IC.stories),'text')}
    ${fieldCard(x,'youtube','مقطع مرئي (يوتيوب)', YT_ICON,'youtube','text-[#FF0000]')}
    ${fieldCard(x,'links','روابط مفيدة', lineIcon(IC.links),'links')}`;

  const prev=NAMES[idx-1], next=NAMES[idx+1];
  $('#prevBtn').disabled=!prev; $('#nextBtn').disabled=!next;
  $('#prevBtn').onclick=()=>{ addingTo=null; prev&&(location.hash='#/name/'+prev.n); };
  $('#nextBtn').onclick=()=>{ addingTo=null; next&&(location.hash='#/name/'+next.n); };
  $('#delBtn').onclick=()=>{
    if(confirm(`حذف الاسم «${x.name}» بالكامل؟ لا يمكن التراجع.`)){
      NAMES.splice(idx,1); renumber(); save(); addingTo=null; location.hash='#/';
    }
  };
}

/* تفويض أحداث الحقول (إضافة/حذف/حفظ بيان) */
$('#detailBody').addEventListener('click', e=>{
  const x=NAMES.find(e2=>e2.n===currentN); if(!x) return;
  const add=e.target.closest('[data-add]');
  if(add){ addingTo = (addingTo===add.dataset.add? null : add.dataset.add); renderDetail(currentN);
           const ed=$('#ed_val'); if(ed) ed.focus(); return; }
  const cancel=e.target.closest('[data-cancel]');
  if(cancel){ addingTo=null; renderDetail(currentN); return; }
  const save=e.target.closest('[data-save]');
  if(save){
    const key=save.dataset.save;
    const val=$('#ed_val')?.value.trim();
    if(!val){ $('#ed_val')?.focus(); return; }
    if(key==='links'){ const label=$('#ed_label')?.value.trim(); x.links.push({label:label||'رابط مفيد', url:val}); }
    else { (x[key]=x[key]||[]).push(val); }
    save(); addingTo=null; renderDetail(currentN); return;
  }
  const del=e.target.closest('[data-del]');
  if(del){ const key=del.dataset.del, i=+del.dataset.i; x[key].splice(i,1); save(); renderDetail(currentN); return; }
});

/* ---------- التوجيه ---------- */
function route(){
  addingTo=null;
  const m=location.hash.match(/^#\/name\/(\d+)/);
  if(m){ indexView.classList.add('hidden'); detailView.classList.remove('hidden'); renderDetail(parseInt(m[1],10)); window.scrollTo({top:0,behavior:'instant'}); }
  else { detailView.classList.add('hidden'); indexView.classList.remove('hidden'); renderGrid($('#searchInput').value||''); }
}
window.addEventListener('hashchange',route);
$('#indexBtn').onclick=()=>{ addingTo=null; location.hash='#/'; };
$('#hdrHome').onclick=()=>location.hash='#/';
$('#searchInput').addEventListener('input',e=>renderGrid(e.target.value));

/* ---------- تطبيع البيانات: كل حقلٍ يصبح قائمة عناصر ---------- */
const TEXT_FIELDS=['meaning','linguistic','evidence','explanation','benefits','dua','stories'];
function normalize(){
  NAMES.forEach(x=>{
    TEXT_FIELDS.forEach(k=>{
      if(typeof x[k]==='string') x[k] = x[k].trim()? [x[k].trim()] : [];
      else if(!Array.isArray(x[k])) x[k]=[];
    });
    if(typeof x.youtube==='string') x.youtube = x.youtube.trim()? [x.youtube.trim()] : [];
    else if(!Array.isArray(x.youtube)) x.youtube=[];
    if(!Array.isArray(x.links)) x.links=[];
  });
}

/* ---------- الحفظ التلقائي (يعمل على موقعك؛ وفي معاينة الدردشة يتجاهَل بهدوء) ---------- */
const STORE_KEY='hejaili_names_of_god_v1';
const DATA_VERSION=3; // يُرفَع كلما حُدِّث المحتوى المضمَّن، فيتقدّم الجديد على المحفوظ القديم
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify({v:DATA_VERSION, data:NAMES})); }catch(e){} }
function load(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s){
      const o=JSON.parse(s);
      // نتجاهل الصيغة القديمة (مصفوفة مباشرة) أو إصدارًا أقدم، فيظهر المحتوى المضمَّن الأحدث
      if(o && !Array.isArray(o) && o.v===DATA_VERSION && Array.isArray(o.data) && o.data.length){
        NAMES.length=0; o.data.forEach(x=>NAMES.push(x));
      }
    }
  }catch(e){}
}
function parseImported(text){
  // يقبل JSON خالص أو ملف يبدأ بـ const NAMES = [...]
  let t=text.trim();
  const a=t.indexOf('['), b=t.lastIndexOf(']');
  if(a!==-1 && b!==-1) t=t.slice(a,b+1);
  try{ return JSON.parse(t); }
  catch(e){ try{ return Function('"use strict";return ('+t+')')(); }catch(e2){ return null; } }
}

/* ---------- إضافة اسم / تصدير / استيراد ---------- */
function renumber(){ NAMES.forEach((x,i)=>x.n=i+1); }
const modal=$('#addModal');
function openAdd(){ modal.classList.remove('hidden'); modal.classList.add('flex'); $('#f_name').focus(); }
function closeAdd(){ modal.classList.add('hidden'); modal.classList.remove('flex');
  ['name','meaning','linguistic','evidence','explanation','benefits','dua','stories','youtube','link'].forEach(k=>{const el=$('#f_'+k); if(el) el.value='';}); }
$('#addNameBtn').onclick=openAdd;
$('#addClose').onclick=closeAdd;
$('#addCancel').onclick=closeAdd;
modal.addEventListener('click',e=>{ if(e.target===modal) closeAdd(); });
$('#addSave').onclick=()=>{
  const name=$('#f_name').value.trim();
  if(!name){ $('#f_name').focus(); return; }
  const T=id=>{const v=$('#f_'+id).value.trim(); return v?[v]:[];};
  const link=$('#f_link').value.trim();
  NAMES.push({
    n:NAMES.length+1, name,
    meaning:T('meaning'), linguistic:T('linguistic'), evidence:T('evidence'), explanation:T('explanation'),
    benefits:T('benefits'), dua:T('dua'), stories:T('stories'),
    youtube:T('youtube'),
    links: link ? [{label:'رابط مفيد', url:link}] : []
  });
  renumber(); save(); closeAdd();
  location.hash='#/name/'+NAMES.length;
};
$('#exportBtn').onclick=()=>{
  const data='const NAMES = '+JSON.stringify(NAMES,null,1)+';';
  const blob=new Blob([data],{type:'text/javascript'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='names_data.js'; a.click();
  URL.revokeObjectURL(a.href);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    const arr=parseImported(r.result);
    if(!Array.isArray(arr)||!arr.length){ alert('تعذّر قراءة الملف. تأكد أنه ملف بيانات صحيح (JSON أو names_data.js).'); return; }
    NAMES.length=0; arr.forEach(o=>NAMES.push(o));
    normalize(); renumber(); save(); closeAdd();
    location.hash='#/'; renderGrid();
    alert('تم استيراد '+NAMES.length+' اسمًا بنجاح.');
  };
  r.readAsText(file);
  e.target.value='';
};
$('#resetBtn').onclick=()=>{
  if(confirm('استعادة البيانات الأصلية المُضمَّنة في الملف وحذف التعديلات المحفوظة؟')){
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
    location.reload();
  }
};

load();
normalize();
renderGrid(); route();
</script>
</body>
</html>
